services:
  - type: web
    name: heb-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MOCK_MODE
        value: "true"
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        sync: false

  - type: web
    name: heb-frontend
    runtime: static
    rootDir: frontend/react-spa
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
